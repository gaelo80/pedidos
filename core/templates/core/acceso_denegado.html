{% extends 'core/base.html' %}

{% block page_title %}Acceso Denegado{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card text-center border-danger shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-lock me-2" aria-hidden="true"></i>Acceso Denegado
                    </h4>
                </div>
                <div class="card-body p-4">
                    <i class="fas fa-triangle-exclamation fa-3x text-danger mb-3" aria-hidden="true"></i>
                    <h5 class="card-title text-danger">No tienes permiso para acceder a esta página.</h5>
                    <p class="card-text text-muted">
                        Contacta al administrador si crees que esto es un error.
                    </p>
                    <a href="{% url 'core:index' %}" class="btn btn-secondary mt-3">
                        <i class="fas fa-arrow-left me-2" aria-hidden="true"></i>Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% extends 'core/base.html' %}

{% block page_title %}Eliminar Acceso a Bodega{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-danger text-white py-3 rounded-top-3">
            <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i> Confirmar Eliminación</h5>
        </div>
        <div class="card-body p-4">
            <p>¿Seguro que deseas eliminar el acceso de <strong>{{ object.usuario }}</strong> a la bodega <strong>{{ object.bodega }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <a href="{% url 'bodega:lista_accesos_bodega' %}" class="btn btn-outline-secondary rounded-pill me-2">Cancelar</a>
                <button type="submit" class="btn btn-danger rounded-pill">
                    <i class="fas fa-trash-alt me-2"></i> Eliminar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}

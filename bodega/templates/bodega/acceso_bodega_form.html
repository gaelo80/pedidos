{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ titulo|default:"Nuevo Acceso a Bodega" }}{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">

    <div class="row align-items-center mb-4">
        <div class="col-md-8">
            <h1 class="display-6 fw-bold mb-0 text-primary">
                <i class="fas fa-user-shield me-2"></i> {{ titulo|default:"Nuevo Acceso a Bodega" }}
            </h1>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <a href="{% url 'bodega:lista_accesos_bodega' %}" class="btn btn-outline-secondary btn-lg rounded-pill shadow-sm">
                <i class="fas fa-arrow-left me-2"></i> Volver
            </a>
        </div>
    </div>

    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-body p-4">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-4 text-end">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                        <i class="fas fa-save me-2"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock content %}

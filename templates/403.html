<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso denegado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --color-fondo-principal: #dfe9e5;
            --color-fondo-tarjeta: #ffffff;
            --color-texto-principal: #343a40;
            --color-texto-secundario: #6c757d;
            --color-navbar-bg: #3b5998;
            --color-warning: #ffc107;
        }
        body {
            background-color: var(--color-fondo-principal);
            color: var(--color-texto-principal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .error-card {
            background-color: var(--color-fondo-tarjeta);
            border-radius: 1rem;
            box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.1);
            max-width: 480px;
            padding: 2.5rem;
            text-align: center;
        }
        .error-codigo { font-size: 4rem; font-weight: 700; color: #b8860b; line-height: 1; }
        .btn-volver {
            background-color: var(--color-navbar-bg);
            border-color: var(--color-navbar-bg);
            color: #fff;
        }
        .btn-volver:hover { background-color: #2d4373; border-color: #2d4373; color: #fff; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-codigo">403</div>
        <h1 class="h4 mt-3 mb-2">No tienes permiso para ver esto</h1>
        <p class="mb-4" style="color: var(--color-texto-secundario);">
            Tu cuenta no tiene acceso a esta sección. Si crees que deberías tenerlo, contacta a un administrador.
        </p>
        <a href="/" class="btn btn-volver rounded-pill px-4">Volver al inicio</a>
    </div>
</body>
</html>
